<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1180" viewBox="0 0 760 1180">
  <defs>
    <style>
      .bg{fill:#171b21}
      .panel{fill:#171b21;stroke:#2b313a;stroke-width:1}
      .muted{fill:#98a2af}
      .text{fill:#dce3eb}
      .brand{fill:#e17a55}
      .pink{fill:#ff4fd8}
      .pill{fill:#20252d;stroke:#313844;stroke-width:1}
      .pill2{fill:#1a1f26;stroke:#303744;stroke-width:1}
      .user{fill:#0f1319}
      .line{stroke:#333b47;stroke-width:2}
      .stroke{stroke:#303744;stroke-width:1;fill:none}
      .soft{fill:#1b2028}
      .good{fill:#56d364}
      .warn{fill:#ffb86b}
      .err{fill:#ff5263}
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .mono{font-family:"SFMono-Regular",Menlo,monospace}
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="760" height="1180"/>

  <!-- Header -->
  <g transform="translate(24 22)">
    <text class="brand" x="0" y="20" font-size="15" font-weight="700">▣ Codex</text>
    <rect class="pill2" x="360" y="0" width="124" height="28" rx="7"/>
    <text class="muted" x="374" y="18" font-size="12">⌁ ChatGPT</text>
    <rect class="pill2" x="492" y="0" width="70" height="28" rx="7"/>
    <text class="good" x="506" y="18" font-size="12">CLI OK</text>
    <rect class="pill2" x="570" y="0" width="78" height="28" rx="7"/>
    <text class="muted" x="584" y="18" font-size="12">已部署</text>
    <rect class="pill" x="660" y="0" width="38" height="28" rx="7"/>
    <text class="muted" x="672" y="19" font-size="15">⟳</text>
  </g>

  <!-- Session strip -->
  <g transform="translate(24 66)">
    <rect class="pill" x="0" y="0" width="96" height="28" rx="7"/>
    <text class="pink" x="12" y="18" font-size="12" font-weight="700">01</text>
    <text class="muted" x="36" y="18" font-size="12">PRD</text>
    <rect class="pill2" x="104" y="0" width="30" height="28" rx="7"/>
    <text class="muted" x="114" y="18" font-size="12">2</text>
    <rect class="pill2" x="142" y="0" width="30" height="28" rx="7"/>
    <text class="muted" x="152" y="18" font-size="14">+</text>
  </g>

  <!-- Chat area -->
  <g transform="translate(24 116)">
    <rect class="user" x="628" y="0" width="70" height="44" rx="8"/>
    <text class="text" x="650" y="27" font-size="15" font-weight="650">你好</text>

    <g transform="translate(0 92)">
      <circle class="brand" cx="6" cy="10" r="4"/>
      <text class="brand" x="20" y="15" font-size="13" font-weight="700">Codex 正在思考</text>
      <text class="muted" x="20" y="40" font-size="13">正在读取当前 vault、整理回复路径...</text>
      <text class="pink" x="20" y="64" font-size="12" font-style="italic">呼吸态：文字和圆点轻微闪烁</text>
    </g>

    <g transform="translate(0 198)">
      <text class="pink" x="0" y="15" font-size="13" font-weight="700">完成，思考了 21 秒</text>
      <text class="text" x="0" y="54" font-size="15">方哥，我会先修掉底部工具栏遮盖，再重做 Agent 对话结构。</text>
    </g>

    <g transform="translate(0 296)">
      <line class="line" x1="8" y1="8" x2="8" y2="174"/>
      <circle class="pink" cx="8" cy="8" r="4"/>
      <text class="text" x="28" y="13" font-size="13" font-weight="700">命令输出</text>
      <text class="muted" x="120" y="13" font-size="12">完成</text>
      <rect class="soft" x="28" y="30" width="650" height="64" rx="7"/>
      <text class="mono" x="44" y="58" font-size="12" fill="#ff4fd8">›</text>
      <text class="text mono" x="64" y="58" font-size="12">npm run typecheck</text>
      <text class="muted mono" x="64" y="80" font-size="12">All tests passed</text>

      <circle class="warn" cx="8" cy="122" r="4"/>
      <text class="text" x="28" y="127" font-size="13" font-weight="700">编辑记录</text>
      <text class="muted" x="110" y="127" font-size="12">3 个文件</text>
      <rect class="soft" x="28" y="144" width="650" height="40" rx="7"/>
      <text class="muted mono" x="44" y="169" font-size="12">styles.css  src/ui/codex-view.ts  docs/design/sidebar-agent-v2.svg</text>
    </g>
  </g>

  <!-- Composer -->
  <g transform="translate(22 920)">
    <rect class="panel" x="0" y="0" width="716" height="228" rx="8"/>
    <g transform="translate(12 10)">
      <rect class="pill2" x="0" y="0" width="108" height="26" rx="13"/>
      <text class="muted" x="12" y="17" font-size="12">📄 01-PRD.md</text>
      <text class="muted" x="122" y="17" font-size="14">×</text>
    </g>
    <text class="text" x="16" y="72" font-size="14">问 Codex，让它管理当前 Obsidian 仓库</text>

    <!-- Parameter row -->
    <g transform="translate(12 140)">
      <rect class="pill2" x="0" y="0" width="128" height="30" rx="6"/>
      <text class="muted" x="12" y="20" font-size="12">⬡</text>
      <text class="text" x="32" y="20" font-size="12" font-weight="650">gpt-5.4</text>
      <rect class="pill2" x="136" y="0" width="104" height="30" rx="6"/>
      <text class="muted" x="148" y="20" font-size="12">🧠</text>
      <text class="text" x="170" y="20" font-size="12">高思考</text>
      <rect class="pill2" x="248" y="0" width="82" height="30" rx="6"/>
      <text class="muted" x="260" y="20" font-size="12">◴</text>
      <text class="text" x="280" y="20" font-size="12">标准</text>
      <rect class="pill2" x="338" y="0" width="122" height="30" rx="6"/>
      <text class="muted" x="350" y="20" font-size="12">盾</text>
      <text class="text" x="374" y="20" font-size="12">工作区可写</text>
      <rect class="pill2" x="468" y="0" width="88" height="30" rx="6"/>
      <text class="muted" x="480" y="20" font-size="12">⌁</text>
      <text class="text" x="502" y="20" font-size="12">Agent</text>
    </g>

    <!-- Action row: icons must be visible -->
    <g transform="translate(12 184)">
      <rect class="pill2" x="0" y="0" width="34" height="30" rx="6"/>
      <text class="muted" x="11" y="20" font-size="13">文</text>
      <rect class="pill2" x="42" y="0" width="34" height="30" rx="6"/>
      <text class="muted" x="53" y="20" font-size="13">夹</text>
      <rect class="pill2" x="84" y="0" width="34" height="30" rx="6"/>
      <text class="muted" x="95" y="20" font-size="13">图</text>
      <rect class="pill2" x="126" y="0" width="46" height="30" rx="6"/>
      <text class="muted" x="138" y="20" font-size="12">MCP</text>
      <text class="warn" x="564" y="20" font-size="12">◔ 0%</text>
      <rect class="pill" x="648" y="0" width="44" height="30" rx="6"/>
      <text class="text" x="663" y="20" font-size="14">↑</text>
    </g>
  </g>
</svg>
